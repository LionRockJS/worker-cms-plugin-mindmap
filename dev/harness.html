<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>mindmap editor harness</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 24px; background: #f9fafb; }
  [data-mm-canvas] { position: relative; height: 65vh; min-height: 24rem; }
  .card { background: #fff; border: 1px solid #e5e7eb; border-radius: 12px; overflow: hidden; margin-bottom: 16px; }
  textarea { width: 100%; font-family: monospace; }
</style>
</head>
<body>
<h1>Mindmap editor harness</h1>
<form method="post" action="#">
  <p><input name="name" value="Launch plan"> <button type="submit">Save</button> <span data-mm-dirty hidden>Unsaved changes</span></p>
  <div data-mindmap class="card">
    <div data-mm-toolbar hidden style="display:flex;gap:8px;padding:12px;border-bottom:1px solid #e5e7eb">
      <button type="button" data-mm-add-child>Add child</button>
      <button type="button" data-mm-add-sibling>Add sibling</button>
      <button type="button" data-mm-rename>Rename</button>
      <button type="button" data-mm-delete>Delete node</button>
      <span style="flex:1"></span>
      <button type="button" data-mm-zoom-out>&minus;</button>
      <button type="button" data-mm-zoom-fit>Fit</button>
      <button type="button" data-mm-zoom-in>+</button>
    </div>
    <div data-mm-canvas hidden></div>
    <div data-mm-fallback style="padding:16px">
      <textarea name="data" data-mm-source rows="16" spellcheck="false">{
  "nodes": [
    { "id": "root", "text": "Launch plan", "parent": null },
    { "id": "a", "text": "Marketing", "parent": "root" },
    { "id": "a1", "text": "Social media campaign with a fairly long label to test wrapping", "parent": "a" },
    { "id": "a2", "text": "Press kit", "parent": "a" },
    { "id": "b", "text": "Engineering", "parent": "root" },
    { "id": "b1", "text": "Beta program", "parent": "b" },
    { "id": "b2", "text": "Bug triage", "parent": "b" },
    { "id": "c", "text": "Sales", "parent": "root" },
    { "id": "d", "text": "Support", "parent": "root" },
    { "id": "d1", "text": "Docs", "parent": "d" }
  ]
}</textarea>
    </div>
  </div>
</form>
<script src="../views/assets/mindmap-editor.js" defer></script>
</body>
</html>
