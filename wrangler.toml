name = "worker-cms-plugin-mindmap"
main = "src/index.ts"
compatibility_date = "2026-07-14"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]

# Admin view templates (LiquidJS + JSON templates, mirroring the CMS) and the
# editor JS asset. The Worker runs first for every request and reads these
# internally via the VIEWS binding, so the files are never served publicly
# except through the plugin's own /assets/ and /__plugin/views/ routes.
[assets]
directory = "./views"
binding = "VIEWS"
run_worker_first = true

[version_metadata]
binding = "CF_VERSION_METADATA"

# The CMS forwards this secret on every admin call, and this plugin sends it
# back on every Plugin API call. Set it to THIS plugin's dedicated secret —
# shown in the CMS admin under Plugins → mindmap → Edit → Shared secret:
#   wrangler secret put PLUGIN_SECRET

# ── Multi-tenant mode (several CMS hosts → this one plugin) ────────────────────
# Bind a KV namespace and add one record per connected CMS; CMS_URL/PLUGIN_SECRET
# then become optional (they form a legacy fallback tenant if kept):
#   wrangler kv namespace create cms-plugin-mindmap-tenants
#   wrangler kv key put --binding TENANTS "tenant:https://cms1.example.com" \
#     '{"secret":"<32-byte hex, unique per CMS>"}'
[[kv_namespaces]]
binding = "TENANTS"
id = "b8837f1af06643478eede46673992cf2"

[vars]
# Base URL of the CMS Worker — where this plugin reaches the Plugin API
# ({CMS_URL}/__cms/*) to read and write mindmap pages.
# CMS_URL = "https://cms.eventuai.com"
